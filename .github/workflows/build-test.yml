name: Build Test EXE (Artifact)

on:
  push:
    branches:
      - test

jobs:
  build-test:
    runs-on: windows-latest  # 为了兼容本地 act 运行，生产建议用 windows-latest

    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4.1.1

      - name: 2. 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.4"

      - name: 3. 安装依赖与 PyInstaller
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pyinstaller

      - name: 4. 执行 PyInstaller 打包
        run: |
          # 注意：Linux 路径使用正斜杠 /，如果在本地 act (Linux) 运行需如此
          pyinstaller --onefile src/video_player_web.py

      - name: 5. 上传打包文件到 Actions 制品库
        uses: actions/upload-artifact@v4
        with:
          name: video-player-test-exe
          path: dist/*
