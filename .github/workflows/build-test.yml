name: Build Test EXE (Artifact)

on:
  push:
    branches:
      - test
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Build EXE
        run: |
          pyinstaller --clean --onefile --paths src --add-data "src/video_player_web/templates;video_player_web/templates" src/video_player_web/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-player-web-exe
          path: dist/*.exe
