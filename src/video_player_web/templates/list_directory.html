<!doctype html>
<html>

  <head>
    <meta charset="utf-8">
    <title>File Server</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        margin: 0;
        padding: 40px;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        background: #1e293b;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      }

      h1 {
        font-size: 1.25rem;
        color: #38bdf8;
        margin-top: 0;
        padding-bottom: 10px;
        border-bottom: 1px solid #334155;
      }

      ul {
        list-style: none;
        padding: 0;
      }

      li {
        padding: 12px 0;
        border-bottom: 1px solid #334155;
        transition: background 0.2s;
      }

      li:last-child {
        border-bottom: none;
      }

      a {
        color: #f1f5f9;
        text-decoration: none;
        display: flex;
        align-items: center;
      }

      a:hover {
        color: #38bdf8;
      }

      .icon {
        margin-right: 12px;
        font-size: 1.2rem;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Index of %%DISPLAYPATH%%</h1>
      <ul>
        %%ITEMS%%
      </ul>
    </div>
  </body>

</html>
